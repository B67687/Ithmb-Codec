# dependabot-auto-merge.yml — Auto-merge Dependabot PRs when CI passes
#
# Two phases:
#   1. On PR open: approve the PR immediately
#   2. On check suite completion: enable auto-merge if all checks pass
#
# Uses pull_request_target so the token has full permissions on the base repo.

name: dependabot-auto-merge

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  approve:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve patch update
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr review --approve --body "✅ Auto-approved patch bump." "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag minor update for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve --body "⚠️ Minor update — review before merge." "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major update for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr review --approve --body "⚠️ Major update — review changelog before merge." "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
