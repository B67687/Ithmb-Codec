# fuzz-weekly.yml — scheduled fuzz testing
#
# Purpose: runs fuzz tests with extended iterations to catch latent
# OOB/overflow/corruption bugs missed by deterministic unit-test fuzz.
# Unit-test fuzz uses fixed seeds; this workflow runs longer iterations
# on a weekly schedule to explore more of the input space.

name: fuzz-weekly

on:
  schedule:
    # Every Monday 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz-linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            10.0.x

      - name: Restore dependencies (locked)
        run: dotnet restore src/IthmbCodec/test/IthmbCodec.Tests.csproj --locked-mode

      - name: Build (Release)
        run: dotnet build src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-restore

      - name: Run fuzz tests (extended iterations)
        run: |
          echo "Running fuzz tests with extended iterations..."

          # Byte-level corruption fuzz
          dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~Fuzz_Corruption_RandomByteMutations" --verbosity normal

          # SIMD tail fuzz
          dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~Fuzz_SimdTail" --verbosity normal

          # AVX-512 tail fuzz
          dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~Avx512Tail" --verbosity normal

          # PhotoDB fuzz
          dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~PhotoDbFuzz" --verbosity normal

          echo "All fuzz tests passed"
