name: test-arm
on: [push]
jobs:
  test_arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p ithmb-core
      - run: cargo test --workspace 2>&1 | tail -3
      - run: echo "ARM runner works!"
