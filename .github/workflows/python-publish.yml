# python-publish.yml — Build and publish Python wheels to PyPI
name: python-publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --release --manifest-path pymod/Cargo.toml --target ${{ matrix.target }}
      - name: Upload wheel
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true
      - name: Publish with maturin
        run: maturin upload --skip-existing wheels/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
