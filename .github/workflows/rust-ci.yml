# rust-ci.yml — Build matrix (OS x features) + clippy verification.
name: rust-ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
          cache: true
          cache-key: "rust-${{ matrix.os }}-${{ hashFiles('rust-toolchain.toml') }}"
      - name: Build
        shell: bash
        env:
        run: |
          exclude=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then exclude='--exclude ithmb-python'; fi
          cargo build --workspace $exclude
      - name: Test
        shell: bash
        env:
          RUST_BACKTRACE: 1
        run: |
          exclude=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then exclude='--exclude ithmb-python'; fi
          cargo test --workspace $exclude

  verify_clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: true
          cache-key: "verify-${{ hashFiles('rust-toolchain.toml') }}"
      - name: cargo clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  check_links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude buymeacoffee --exclude 'home.fau.edu' --exclude imageglass.org --exclude mybroadband --exclude buy.stripe.com --exclude 'mdsite.duckdns.org' README.md docs/
          fail: true

  verify_deny:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "deny-${{ hashFiles('deny.toml') }}"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.20.2
      - name: cargo deny check
        run: cargo deny check

  benchmark_regression:
    runs-on: ubuntu-latest
    needs: [build, verify_clippy, check_links, verify_deny]
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "bench-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('.github/baseline.json') }}"
      - name: Benchmark regression check
        env:
          FAIL_THRESHOLD: 1.25
        shell: bash
        run: |
          tools/check-benchmark-regression.sh
      - name: Upload CI benchmark data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-benchmark-data
          path: /tmp/ci-benchmark-output.txt
          retention-days: 7
  fuzz:
    runs-on: ubuntu-latest
    needs: [build, verify_clippy]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "fuzz-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('fuzz/Cargo.toml') }}"
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --debug 2>&1 | tail -3
      - name: Fuzz decode_ithmb
        run: cargo fuzz run fuzz_decode_ithmb -- -max_total_time=30 2>&1 | tail -5
        working-directory: ./fuzz
      - name: Fuzz open_ithmb
        run: cargo fuzz run fuzz_open_ithmb -- -max_total_time=30 2>&1 | tail -5
        working-directory: ./fuzz
      - name: Fuzz encode roundtrip
        run: cargo fuzz run fuzz_encode_roundtrip -- -max_total_time=30 2>&1 | tail -5
        working-directory: ./fuzz

  build_c_api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          cache-key: "c-api-${{ hashFiles('rust-toolchain.toml') }}"
      - name: Build with c feature
        run: cargo build -p ithmb-core --features c
      - name: Verify C symbols are exported
        run: nm -D target/debug/libithmb_core.so | grep -E 'ithmb_decode|ithmb_prefix_to_profile'
      - name: Run C API integration test
        run: cargo test -p ithmb-core --features c --test c_api_test

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache: true
          cache-key: "wasm-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('crates/ithmb-wasm/Cargo.toml') }}"
      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --locked --version 0.12.1
      - name: Build wasm
        shell: bash
        run: wasm-pack build crates/ithmb-wasm/

  doc_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-docs
          cache: true
          cache-key: "doc-${{ hashFiles('rust-toolchain.toml') }}"
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: typos-cli check
        shell: bash
        run: |
          cargo install typos-cli --locked --version 1.42.3 2>&1 | tail -3
          typos -- ./README.md ./AGENTS.md ./ARCHITECTURE.md ./crates/ ./docs/
          typos -- ./README.md ./AGENTS.md ./ARCHITECTURE.md ./crates/ ./docs/
