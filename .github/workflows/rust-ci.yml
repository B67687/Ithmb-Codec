# rust-ci.yml — Build matrix (OS x features) + clippy verification.
name: rust-ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        features: ["", "simd"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'macos-latest' && matrix.features == 'simd' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
          cache: ${{ !(matrix.os == 'macos-latest' && matrix.features == 'simd') }}
          cache-key: "rust-${{ matrix.os }}-${{ hashFiles('rust-toolchain.toml') }}"
      - name: Build
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.features == 'simd' && '-C target-feature=+neon' || '' }}
        run: |
          exclude=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then exclude='--exclude ithmb-python'; fi
          cargo build --workspace ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }} $exclude
      - name: Test
        shell: bash
        env:
          RUST_BACKTRACE: 1
          RUSTFLAGS: ${{ matrix.features == 'simd' && '-C target-feature=+neon' || '' }}
        run: |
          exclude=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then exclude='--exclude ithmb-python'; fi
          cargo test --workspace ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }} $exclude

  verify_clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: true
          cache-key: "verify-${{ hashFiles('rust-toolchain.toml') }}"
      - name: cargo clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
