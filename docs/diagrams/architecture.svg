<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 610" font-family="Arial,sans-serif" font-size="13">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M0,0 L10,5 L0,10Z" fill="#666"/>
  </marker>
  <style>
    rect.bx{fill:#e8f4f8;stroke:#4a90d9;stroke-width:1.5;rx:5}
    rect.i{fill:#d4e8f0;stroke:#4a90d9;stroke-width:1;rx:3}
    rect.gr{fill:#d4edda;stroke:#5cb85c;stroke-width:1.5;rx:5}
    rect.yw{fill:#fff3cd;stroke:#f0ad4e;stroke-width:1.5;rx:5}
    rect.or{fill:#fde8d0;stroke:#e67e22;stroke-width:1.5;rx:5}
    rect.dc{fill:#f0f0f0;stroke:#999;stroke-width:1;rx:3}
    text.t{fill:#2c6fa0;font-weight:bold;font-size:14px;text-anchor:middle}
    text.l{fill:#333;text-anchor:middle;font-size:12px}
    text.s{fill:#666;text-anchor:middle;font-size:11px}
    text.y{fill:#5cb85c;font-size:11px}
    text.n{fill:#d9534f;font-size:11px}
    text.b{fill:#2c6fa0;font-weight:bold;font-size:11px;text-anchor:middle}
    path.e{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#a)}
  </style>
</defs>

<!-- ==================== INPUT ROW ==================== -->
<rect x="355" y="10" width="90" height="22" class="gr"/>
<text x="400" y="25" class="l">.ithmb file</text>

<rect x="475" y="10" width="170" height="22" class="gr"/>
<text x="560" y="25" class="l">PhotoDB container (mhfd)</text>

<path d="M400,32 L400,55" class="e"/>
<path d="M560,32 L560,55" class="e"/>

<!-- ==================== THREE-COLUMN LAYER ==================== -->
<!-- ImageGlass Plugin (separate repo) -->
<rect x="50" y="55" width="240" height="130" class="bx"/>
<text x="170" y="73" class="t">ImageGlass C ABI Plugin</text>
<rect x="60" y="82" width="220" height="22" class="i"/>
<text x="170" y="97" class="l">ig_plugin_get_api()</text>
<rect x="60" y="107" width="220" height="22" class="i"/>
<text x="170" y="122" class="l">decode_ithmb()</text>
<rect x="60" y="132" width="220" height="22" class="i"/>
<text x="170" y="147" class="l">FreePixelBuffer()</text>
<text x="170" y="170" class="s">(separate repo)</text>

<!-- Decode Pipeline -->
<rect x="380" y="55" width="240" height="115" class="bx"/>
<text x="500" y="73" class="t">Decode Pipeline</text>
<rect x="390" y="89" width="220" height="22" class="i"/>
<text x="500" y="104" class="l">Size Guard (&lt; 32 MB)</text>
<rect x="390" y="114" width="220" height="22" class="i"/>
<text x="500" y="129" class="l">Peek 4B: Detect JPEG / mhfd / 4B</text>

<!-- 54 Profiles -->
<rect x="710" y="55" width="240" height="115" class="bx"/>
<text x="830" y="73" class="t">54 Profiles</text>
<text x="830" y="97" class="l">25 Photo (1005-3011)</text>
<text x="830" y="114" class="l">29 Cover Art (1010-1081)</text>
<text x="830" y="131" class="l">profiles.json override</text>
<text x="830" y="151" class="s">Runtime extensible (no recompile)</text>

<!-- Connector lines -->
<path d="M290,112 L380,112" class="e"/>
<path d="M710,112 L620,112" class="e"/>
<path d="M500,170 L500,197" class="e"/>

<!-- ==================== DECISION ==================== -->
<rect x="400" y="197" width="200" height="24" class="dc"/>
<text x="500" y="213" class="l">4B prefix == JPEG SOI?</text>

<path d="M400,209 L170,209 L170,250" class="e"/>
<text x="285" y="205" class="y">Yes</text>

<path d="M600,209 L830,209 L830,250" class="e"/>
<text x="715" y="205" class="n">No</text>

<!-- ==================== DECODE PATHS ==================== -->
<!-- JPEG path -->
<rect x="50" y="250" width="240" height="65" class="gr"/>
<text x="170" y="268" class="t">JPEG Path</text>
<text x="170" y="288" class="l">jpeg-decoder crate</text>
<text x="170" y="305" class="l">BGRA + EXIF Orientation</text>

<!-- Raw path -->
<rect x="710" y="250" width="240" height="85" class="yw"/>
<text x="830" y="268" class="t">Raw Path</text>
<text x="830" y="288" class="l">mhfd → PhotoDB → entries → match</text>
<text x="830" y="305" class="l">4B prefix → 54 profiles → match</text>
<text x="830" y="322" class="l">→ raw decoder dispatch</text>

<!-- Convergence arrows -->
<path d="M170,315 L170,360" class="e" style="marker-end:none"/>
<path d="M830,335 L830,360" class="e" style="marker-end:none"/>
<path d="M170,360 L830,360" class="e" style="marker-end:none"/>
<path d="M500,360 L500,380" class="e"/>

<!-- ==================== 8 RAW DECODERS ==================== -->
<rect x="360" y="380" width="280" height="115" class="bx"/>
<text x="500" y="398" class="t">8 Raw Decoders</text>
<rect x="370" y="407" width="260" height="20" class="i"/>
<text x="500" y="421" class="l">RGB565 / RGB555 / ReorderedRGB555</text>
<rect x="370" y="430" width="260" height="20" class="i"/>
<text x="500" y="444" class="l">UYVY / YCbCr420 / CLCL / CL</text>
<rect x="370" y="453" width="260" height="20" class="i"/>
<text x="500" y="467" class="l">JPEG carving fallback</text>
<text x="500" y="487" class="b">SIMD: SSE2 / AVX2 / NEON runtime dispatch</text>

<path d="M500,495 L500,520" class="e"/>

<!-- ==================== POST-PROCESSING ==================== -->
<rect x="400" y="520" width="200" height="25" class="or"/>
<text x="500" y="537" class="l">Post: crop / rotation / channel swap</text>

<path d="M500,545 L500,565" class="e"/>

<!-- ==================== OUTPUT ==================== -->
<rect x="420" y="565" width="160" height="25" class="gr"/>
<text x="500" y="582" class="l">BGRA Pixels</text>
</svg>
